name: Build and Release

on:
  push:
    tags:
      - 'v*'  # trigger on tags like v1.0.0, v2.1.0
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    name: Build Zed for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: zed-linux
          - os: macos-latest
            target: macos
            artifact_name: zed-macos
          - os: windows-latest
            target: windows
            artifact_name: zed-windows.exe

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libssl-dev libxcb-render-util0-dev libxcb-util-dev libxcb-keysyms1-dev \
            libxcb-icccm4-dev libxcb-cursor-dev libxcb-xinerama0-dev

      - name: Build Zed
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/zed${{ matrix.target == 'windows' && '.exe' || '' }}

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp target/release/zed${{ matrix.target == 'windows' && '.exe' || '' }} release/${{ matrix.artifact_name }}
          echo "Custom Zed build with environment variable support" > release/README.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*
          generate_release_notes: true
