name: Zed

on:
  push:
    branches: [ main, develop, 'feature/*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # اجرای دستی
    inputs:
      build_type:
        description: 'نوع build'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  # job برای لینوکس
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.arch == 'aarch64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}
          override: true
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libxcb-render-util0-dev \
            libxcb-util-dev \
            libxcb-keysyms1-dev \
            libxcb-icccm4-dev \
            libxcb-cursor-dev \
            libxcb-xinerama0-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxkbcommon-x11-dev \
            libgtk-3-dev \
            libasound2-dev

      - name: Build Zed (Release)
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p artifacts/linux-${{ matrix.arch }}
          cp target/release/zed artifacts/linux-${{ matrix.arch }}/
          cp target/release/zed artifacts/linux-${{ matrix.arch }}/zed-custom
          echo "Custom build with env support: ZED_CONFIG_DIR, ZED_DATA_DIR, ZED_CACHE_DIR" > artifacts/linux-${{ matrix.arch }}/README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-${{ matrix.arch }}
          path: artifacts/linux-${{ matrix.arch }}
          compression-level: 9
          retention-days: 30

  # job برای macOS
  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
          override: true

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Zed
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p artifacts/macos-${{ matrix.arch }}
          cp target/release/zed artifacts/macos-${{ matrix.arch }}/
          cp target/release/zed artifacts/macos-${{ matrix.arch }}/zed-custom
          echo "Custom build with env support" > artifacts/macos-${{ matrix.arch }}/README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-macos-${{ matrix.arch }}
          path: artifacts/macos-${{ matrix.arch }}

  # job برای ویندوز
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Zed
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir artifacts
          copy target\release\zed.exe artifacts\zed-custom.exe
          echo "Custom build with env support" > artifacts\README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-windows
          path: artifacts

  # job برای ایجاد Release
  create-release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Organize release files
        run: |
          mkdir release-files
          cp -r all-artifacts/*/* release-files/
          cd release-files
          tar -czf zed-linux-x86_64.tar.gz linux-x86_64/
          tar -czf zed-linux-aarch64.tar.gz linux-aarch64/
          tar -czf zed-macos-x86_64.tar.gz macos-x86_64/
          tar -czf zed-macos-aarch64.tar.gz macos-aarch64/
          zip -r zed-windows.zip windows/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          generate_release_notes: true
          draft: false
          prerelease: contains(github.ref, '-beta')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # job برای تست خودکار
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build-linux]
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: zed-linux-x86_64
          path: test-build

      - name: Make executable
        run: |
          chmod +x test-build/zed-custom
          ./test-build/zed-custom --version

      - name: Test custom env vars
        run: |
          export ZED_CONFIG_DIR=/tmp/zed-test-config
          export ZED_DATA_DIR=/tmp/zed-test-data
          export ZED_CACHE_DIR=/tmp/zed-test-cache
          mkdir -p $ZED_CONFIG_DIR $ZED_DATA_DIR $ZED_CACHE_DIR
          echo "Testing custom paths..."
