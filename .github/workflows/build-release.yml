name: Build and Release

on:
  push:
    tags:
      - 'v*'  # trigger on tags like v1.0.0, v2.1.0
  workflow_dispatch:  # allow manual trigger
    inputs:
      build_linux:
        description: 'Build for Linux'
        type: boolean
        default: true
        required: false
      build_macos:
        description: 'Build for macOS'
        type: boolean
        default: true
        required: false
      build_windows:
        description: 'Build for Windows'
        type: boolean
        default: true
        required: false
      build_type:
        description: 'Build type'
        type: choice
        options:
          - release
          - debug
        default: 'release'
        required: false
      custom_flags:
        description: 'Custom cargo build flags (optional)'
        type: string
        default: ''
        required: false
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
        required: false
      release_tag:
        description: 'Release tag (if create_release is true)'
        type: string
        default: 'manual-build'
        required: false

jobs:
  build:
    name: Build Zed for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include: 
          - os: ubuntu-latest
            target: linux
            artifact_name: zed-linux
            extension: ''
            build_condition: ${{ github.event_name == 'push' || inputs.build_linux }}
          - os: macos-latest
            target: macos
            artifact_name: zed-macos
            extension: ''
            build_condition: ${{ github.event_name == 'push' || inputs.build_macos }}
          - os: windows-latest
            target: windows
            artifact_name: zed-windows.exe
            extension: '.exe'
            build_condition: ${{ github.event_name == 'push' || inputs.build_windows }}
    # فقط در صورتی که شرط build_condition برقرار باشد اجرا شود
    if: ${{ matrix.build_condition == true || github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # برای گرفتن تگ‌ها و تاریخچه کامل

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libxcb-render-util0-dev \
            libxcb-util-dev \
            libxcb-keysyms1-dev \
            libxcb-icccm4-dev \
            libxcb-cursor-dev \
            libxcb-xinerama0-dev \
            libxcb-randr0-dev \
            libxcb-composite0-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcomposite-dev \
            libxcursor-dev

      - name: Install dependencies (macOS)
        if: matrix.target == 'macos'
        run: |
          brew update
          brew install cmake pkg-config

      - name: Install dependencies (Windows)
        if: matrix.target == 'windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          # اضافه کردن cmake به PATH
          echo "C:\Program Files\CMake\bin" >> $env:GITHUB_PATH

      - name: Set build type
        run: |
          if [[ "${{ github.event.inputs.build_type }}" == "debug" ]]; then
            echo "BUILD_FLAG=" >> $GITHUB_ENV
            echo "BUILD_DIR=debug" >> $GITHUB_ENV
          else
            echo "BUILD_FLAG=--release" >> $GITHUB_ENV
            echo "BUILD_DIR=release" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Get version from tag or manual input
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ "${{ github.event.inputs.release_tag }}" != "" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="manual-build-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Build Zed
        run: |
          cargo build ${{ env.BUILD_FLAG }} ${{ github.event.inputs.custom_flags }}
        shell: bash

      - name: Run tests (optional)
        if: false  # برای صرفه‌جویی در زمان، غیرفعال است. برای فعال کردن true کنید
        run: |
          cargo test ${{ env.BUILD_FLAG }}

      - name: Upload artifact (GitHub Actions Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}
          path: target/${{ env.BUILD_DIR }}/zed${{ matrix.extension }}
          retention-days: 30
          compression-level: 6

      - name: Prepare release assets
        if: github.event_name == 'push' || inputs.create_release == true
        run: |
          mkdir -p release
          # کپی فایل اجرایی
          cp target/${{ env.BUILD_DIR }}/zed${{ matrix.extension }} release/${{ matrix.artifact_name }}
          
          # ایجاد فایل اطلاعات نسخه
          cat > release/version_info.txt << EOF
          Version: ${{ steps.get_version.outputs.VERSION }}
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Build Type: ${{ github.event.inputs.build_type }}
          Platform: ${{ matrix.target }}
          Commit: ${{ github.sha }}
          EOF
          
          # ایجاد فایل README
          cat > release/README.md << EOF
          # Zed Custom Build - ${{ steps.get_version.outputs.VERSION }}
          
          ## ویژگی‌های اضافه شده
          
          این نسخه از Zed از متغیرهای محیطی زیر پشتیبانی می‌کند:
          
          - \`ZED_CONFIG_DIR\` - مسیر تنظیمات
          - \`ZED_DATA_DIR\` - مسیر داده‌ها
          - \`ZED_CACHE_DIR\` - مسیر کش
          
          ## نحوه استفاده
          
          ### Linux / macOS
          \`\`\`bash
          export ZED_CONFIG_DIR=/custom/config/path
          export ZED_DATA_DIR=/custom/data/path
          export ZED_CACHE_DIR=/custom/cache/path
          chmod +x zed-linux
          ./zed-linux
          \`\`\`
          
          ### Windows
          \`\`\`cmd
          set ZED_CONFIG_DIR=C:\custom\config\path
          set ZED_DATA_DIR=C:\custom\data\path
          set ZED_CACHE_DIR=C:\custom\cache\path
          zed-windows.exe
          \`\`\`
          
          ## اطلاعات ساخت
          $(cat release/version_info.txt)
          EOF
          
          # فشرده‌سازی برای آپلود (اختیاری)
          tar -czf release/${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}.tar.gz -C release ${{ matrix.artifact_name }} README.md version_info.txt

      - name: Upload to Release (only for tags or manual release)
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' || inputs.create_release == true
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body_path: release/README.md
          files: |
            release/${{ matrix.artifact_name }}
            release/*.tar.gz
            release/README.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'alpha') }}
          generate_release_notes: true
        continue-on-error: true  # اگر release از قبل وجود داشت، خطا ندهد

  # Job اضافی برای ایجاد summary
  create_summary:
    name: Create build summary
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Create build summary
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: ${{ github.event.inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom Flags**: ${{ github.event.inputs.custom_flags || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Download Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "You can download the built artifacts from the 'Artifacts' section below." >> $GITHUB_STEP_SUMMARY
