# Generated from xtask::workflows::release
# Rebuild with `cargo xtask workflows`.
name: release
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        type: boolean
        default: false
      build_platforms:
        description: 'Platforms to build (comma-separated)'
        required: false
        type: string
        default: 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64'

jobs:
  run_tests_mac:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false)
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup cargo config
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/ci-config.toml ./../.cargo/config.toml

      - name: Cache rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: Cleanup cargo config
        if: always()
        run: rm -rf ./../.cargo
    timeout-minutes: 60

  run_tests_linux:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup cargo config
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/ci-config.toml ./../.cargo/config.toml

      - name: Cache rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup2.4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            clang

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: Cleanup cargo config
        if: always()
        run: rm -rf ./../.cargo
    timeout-minutes: 60

  run_tests_windows:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false)
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup cargo config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./../.cargo" -Force
          Copy-Item -Path "./.cargo/ci-config.toml" -Destination "./../.cargo/config.toml"

      - name: Cache rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        shell: pwsh
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: Cleanup cargo config
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Recurse -Path "./../.cargo" -Force -ErrorAction SilentlyContinue
    timeout-minutes: 60

  clippy:
    needs: [run_tests_linux]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            pkg-config \
            clang

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
    timeout-minutes: 60

  create_draft_release:
    needs: [run_tests_linux, clippy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Determine release tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo="$GITHUB_REPOSITORY" \
            --draft \
            --title="$RELEASE_TAG" \
            --generate-notes
    timeout-minutes: 60

  bundle_linux_x86_64:
    needs: [create_draft_release]
    if: contains(github.event.inputs.build_platforms || 'linux-x86_64', 'linux-x86_64')
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup2.4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            clang

      - name: Build release
        run: cargo build --release

      - name: Package release
        run: |
          mkdir -p release
          cp target/release/zed release/ 2>/dev/null || true
          cp target/release/zed-remote-server release/ 2>/dev/null || true
          tar -czf zed-linux-x86_64.tar.gz -C release .
          gzip -c release/zed-remote-server > zed-remote-server-linux-x86_64.gz 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-x86_64.tar.gz
          path: zed-linux-x86_64.tar.gz

      - name: Upload remote server
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-linux-x86_64.gz
          path: zed-remote-server-linux-x86_64.gz
    timeout-minutes: 60

  bundle_linux_aarch64:
    needs: [create_draft_release]
    if: contains(github.event.inputs.build_platforms || 'linux-aarch64', 'linux-aarch64')
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup cross-compilation
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            pkg-config \
            crossbuild-essential-arm64

      - name: Build release
        run: |
          rustup target add aarch64-unknown-linux-gnu
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package release
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/zed release/ 2>/dev/null || true
          cp target/aarch64-unknown-linux-gnu/release/zed-remote-server release/ 2>/dev/null || true
          tar -czf zed-linux-aarch64.tar.gz -C release .
          gzip -c release/zed-remote-server > zed-remote-server-linux-aarch64.gz 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-aarch64.tar.gz
          path: zed-linux-aarch64.tar.gz

      - name: Upload remote server
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-linux-aarch64.gz
          path: zed-remote-server-linux-aarch64.gz
    timeout-minutes: 60

  bundle_mac_x86_64:
    needs: [create_draft_release]
    if: contains(github.event.inputs.build_platforms || 'mac-x86_64', 'mac-x86_64')
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Build release
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package release
        run: |
          mkdir -p release
          cp target/x86_64-apple-darwin/release/zed release/ 2>/dev/null || true
          cp target/x86_64-apple-darwin/release/zed-remote-server release/ 2>/dev/null || true
          gzip -c release/zed-remote-server > zed-remote-server-macos-x86_64.gz 2>/dev/null || true

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-macos-x86_64.gz
          path: zed-remote-server-macos-x86_64.gz
    timeout-minutes: 60

  bundle_mac_aarch64:
    needs: [create_draft_release]
    if: contains(github.event.inputs.build_platforms || 'mac-aarch64', 'mac-aarch64')
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package release
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/zed release/ 2>/dev/null || true
          cp target/aarch64-apple-darwin/release/zed-remote-server release/ 2>/dev/null || true
          gzip -c release/zed-remote-server > zed-remote-server-macos-aarch64.gz 2>/dev/null || true

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-macos-aarch64.gz
          path: zed-remote-server-macos-aarch64.gz
    timeout-minutes: 60

  bundle_windows_x86_64:
    needs: [create_draft_release]
    if: contains(github.event.inputs.build_platforms || 'windows-x86_64', 'windows-x86_64')
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Build release
        shell: pwsh
        run: cargo build --release

      - name: Package release
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/zed-remote-server.exe -DestinationPath zed-remote-server-windows-x86_64.zip

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-windows-x86_64.zip
          path: zed-remote-server-windows-x86_64.zip
    timeout-minutes: 60

  bundle_windows_aarch64:
    needs: [create_draft_release]
    if: contains(github.event.inputs.build_platforms || 'windows-aarch64', 'windows-aarch64')
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Build release
        shell: pwsh
        run: cargo build --release --target aarch64-pc-windows-msvc

      - name: Package release
        shell: pwsh
        run: |
          Compress-Archive -Path target/aarch64-pc-windows-msvc/release/zed-remote-server.exe -DestinationPath zed-remote-server-windows-aarch64.zip

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-windows-aarch64.zip
          path: zed-remote-server-windows-aarch64.zip
    timeout-minutes: 60

  upload_release_assets:
    needs:
      - create_draft_release
      - bundle_linux_aarch64
      - bundle_linux_x86_64
      - bundle_mac_aarch64
      - bundle_mac_x86_64
      - bundle_windows_aarch64
      - bundle_windows_x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: Display structure of artifacts
        run: ls -lR ./artifacts

      - name: Determine release tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          find ./artifacts -type f -name "*.tar.gz" -o -name "*.gz" -o -name "*.zip" -o -name "*.dmg" | while read asset; do
            echo "Uploading $asset..."
            gh release upload "$RELEASE_TAG" "$asset" --repo="$GITHUB_REPOSITORY" --clobber
          done
    timeout-minutes: 30

  publish_release:
    needs: [upload_release_assets]
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          gh release edit "$RELEASE_TAG" --repo="$GITHUB_REPOSITORY" --draft=false
    timeout-minutes: 30

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
