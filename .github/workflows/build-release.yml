name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build for Linux'
        type: boolean
        default: true
      build_macos:
        description: 'Build for macOS'
        type: boolean
        default: true
      build_windows:
        description: 'Build for Windows'
        type: boolean
        default: true
      build_type:
        description: 'Build type'
        type: choice
        options:
          - release
          - debug
        default: 'release'
      custom_flags:
        description: 'Custom cargo build flags'
        type: string
        default: ''
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (if create_release is true)'
        type: string
        default: 'manual-build'

jobs:
  build-linux:
    name: Build Zed for Linux
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.build_linux == true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libssl-dev libxcb-render-util0-dev libxcb-util-dev \
            libxcb-keysyms1-dev libxcb-icccm4-dev libxcb-cursor-dev \
            libxcb-xinerama0-dev libxcb-randr0-dev libxcb-composite0-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcomposite-dev \
            libxcursor-dev

      - name: Set build type
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            echo "BUILD_FLAG=" >> $GITHUB_ENV
            echo "BUILD_DIR=debug" >> $GITHUB_ENV
          else
            echo "BUILD_FLAG=--release" >> $GITHUB_ENV
            echo "BUILD_DIR=release" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ inputs.release_tag }}-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Zed
        run: cargo build ${{ env.BUILD_FLAG }} ${{ inputs.custom_flags }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-${{ steps.get_version.outputs.VERSION }}
          path: target/${{ env.BUILD_DIR }}/zed
          retention-days: 30

      - name: Prepare release assets
        if: github.event_name == 'push' || inputs.create_release == true
        run: |
          mkdir -p release
          cp target/${{ env.BUILD_DIR }}/zed release/zed-linux
          chmod +x release/zed-linux
          
          cat > release/README.md << EOF
          # Zed Custom Build - ${{ steps.get_version.outputs.VERSION }}
          
          ## Environment Variables Support
          - \`ZED_CONFIG_DIR\` - Custom config directory
          - \`ZED_DATA_DIR\` - Custom data directory
          - \`ZED_CACHE_DIR\` - Custom cache directory
          
          ## Usage
          \`\`\`bash
          export ZED_CONFIG_DIR=/custom/config/path
          export ZED_DATA_DIR=/custom/data/path
          export ZED_CACHE_DIR=/custom/cache/path
          ./zed-linux
          \`\`\`
          EOF

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: (github.event_name == 'push' || inputs.create_release == true) && github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: release/zed-linux
          generate_release_notes: true

  build-macos:
    name: Build Zed for macOS
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_macos == true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config

      - name: Set build type
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            echo "BUILD_FLAG=" >> $GITHUB_ENV
            echo "BUILD_DIR=debug" >> $GITHUB_ENV
          else
            echo "BUILD_FLAG=--release" >> $GITHUB_ENV
            echo "BUILD_DIR=release" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ inputs.release_tag }}-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Zed
        run: cargo build ${{ env.BUILD_FLAG }} ${{ inputs.custom_flags }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-macos-${{ steps.get_version.outputs.VERSION }}
          path: target/${{ env.BUILD_DIR }}/zed
          retention-days: 30

      - name: Prepare release assets
        if: github.event_name == 'push' || inputs.create_release == true
        run: |
          mkdir -p release
          cp target/${{ env.BUILD_DIR }}/zed release/zed-macos
          chmod +x release/zed-macos
          
          cat > release/README.md << 'EOF'
          # Zed Custom Build for macOS
          
          ## Environment Variables Support
          - `ZED_CONFIG_DIR` - Custom config directory
          - `ZED_DATA_DIR` - Custom data directory
          - `ZED_CACHE_DIR` - Custom cache directory
          EOF

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: (github.event_name == 'push' || inputs.create_release == true) && github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: release/zed-macos
          generate_release_notes: true

  build-windows:
    name: Build Zed for Windows
    runs-on: windows-latest
    if: github.event_name == 'push' || inputs.build_windows == true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set build type
        run: |
          if ("${{ inputs.build_type }}" -eq "debug") {
            echo "BUILD_FLAG=" >> $env:GITHUB_ENV
            echo "BUILD_DIR=debug" >> $env:GITHUB_ENV
          } else {
            echo "BUILD_FLAG=--release" >> $env:GITHUB_ENV
            echo "BUILD_DIR=release" >> $env:GITHUB_ENV
          }
        shell: powershell

      - name: Get version
        id: get_version
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $VERSION = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $VERSION = "${{ inputs.release_tag }}-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Build Zed
        run: cargo build ${{ env.BUILD_FLAG }} ${{ inputs.custom_flags }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-windows-${{ steps.get_version.outputs.VERSION }}
          path: target/${{ env.BUILD_DIR }}/zed.exe
          retention-days: 30

      - name: Prepare release assets
        if: github.event_name == 'push' || inputs.create_release == true
        run: |
          mkdir release
          copy target\${{ env.BUILD_DIR }}\zed.exe release\zed-windows.exe
          
          @"
          # Zed Custom Build for Windows
          
          ## Environment Variables Support
          - `ZED_CONFIG_DIR` - Custom config directory
          - `ZED_DATA_DIR` - Custom data directory
          - `ZED_CACHE_DIR` - Custom cache directory
          "@ > release\README.md
        shell: powershell

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: (github.event_name == 'push' || inputs.create_release == true) && github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: release/zed-windows.exe
          generate_release_notes: true
