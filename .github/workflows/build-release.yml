name: release
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        type: boolean
        default: false
      build_platforms:
        description: 'Platforms to build (comma-separated: linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64)'
        required: false
        type: string
        default: 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64'

jobs:
  validate_tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate tag exists
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if ! git tag -l "$RELEASE_TAG" | grep -q "$RELEASE_TAG"; then
            echo "❌ Error: Tag '$RELEASE_TAG' does not exist in the repository"
            echo "Available tags:"
            git tag -l
            exit 1
          fi
          echo "✅ Tag '$RELEASE_TAG' found"

  run_tests_mac:
    needs: [validate_tag]
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false && always())
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup cargo config
        run: |
          mkdir -p ./../.cargo
          if [ -f ./.cargo/ci-config.toml ]; then
            cp ./.cargo/ci-config.toml ./../.cargo/config.toml
          fi

      - name: Cache rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mac-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: Cleanup cargo config
        if: always()
        run: rm -rf ./../.cargo
    timeout-minutes: 60

  run_tests_linux:
    needs: [validate_tag]
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false && always())
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup cargo config
        run: |
          mkdir -p ./../.cargo
          if [ -f ./.cargo/ci-config.toml ]; then
            cp ./.cargo/ci-config.toml ./../.cargo/config.toml
          fi

      - name: Cache rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup2.4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            clang

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: Cleanup cargo config
        if: always()
        run: rm -rf ./../.cargo
    timeout-minutes: 60

  run_tests_windows:
    needs: [validate_tag]
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false && always())
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup cargo config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./../.cargo" -Force
          if (Test-Path "./.cargo/ci-config.toml") {
            Copy-Item -Path "./.cargo/ci-config.toml" -Destination "./../.cargo/config.toml"
          }

      - name: Cache rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        shell: pwsh
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: Cleanup cargo config
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Recurse -Path "./../.cargo" -Force -ErrorAction SilentlyContinue
    timeout-minutes: 60

  clippy:
    needs: [run_tests_linux]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_tests == false)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            pkg-config \
            clang

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
    timeout-minutes: 60

  create_draft_release:
    needs: [run_tests_linux, run_tests_mac, run_tests_windows, clippy]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && always())
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine release tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          
          # Check if tag already has a release
          if gh release view "$TAG" --repo="$GITHUB_REPOSITORY" &>/dev/null; then
            echo "⚠️ Release for $TAG already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create draft release
        if: steps.determine_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo="$GITHUB_REPOSITORY" \
            --draft \
            --title="$RELEASE_TAG" \
            --generate-notes
          
          echo "✅ Draft release created for $RELEASE_TAG"
    timeout-minutes: 60

  bundle_linux_x86_64:
    needs: [create_draft_release]
    if: |
      contains(github.event.inputs.build_platforms || 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64', 'linux-x86_64')
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup2.4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            clang

      - name: Build release
        run: |
          cargo build --release

      - name: Package release
        run: |
          mkdir -p release-artifacts
          # Copy binaries if they exist
          for bin in zed zed-remote-server; do
            if [ -f "target/release/$bin" ]; then
              cp "target/release/$bin" release-artifacts/
            fi
          done
          
          # Create archive
          if [ "$(ls -A release-artifacts)" ]; then
            tar -czf zed-linux-x86_64.tar.gz -C release-artifacts .
            
            # Create remote server archive
            if [ -f release-artifacts/zed-remote-server ]; then
              gzip -c release-artifacts/zed-remote-server > zed-remote-server-linux-x86_64.gz
            fi
          else
            echo "⚠️ No binaries found to package"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-x86_64
          path: |
            zed-linux-x86_64.tar.gz
            zed-remote-server-linux-x86_64.gz
    timeout-minutes: 60

  bundle_linux_aarch64:
    needs: [create_draft_release]
    if: |
      contains(github.event.inputs.build_platforms || 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64', 'linux-aarch64')
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Setup cross-compilation
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            pkg-config \
            crossbuild-essential-arm64
          
          rustup target add aarch64-unknown-linux-gnu

      - name: Build release
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package release
        run: |
          mkdir -p release-artifacts
          # Copy binaries if they exist
          for bin in zed zed-remote-server; do
            if [ -f "target/aarch64-unknown-linux-gnu/release/$bin" ]; then
              cp "target/aarch64-unknown-linux-gnu/release/$bin" release-artifacts/
            fi
          done
          
          # Create archive
          if [ "$(ls -A release-artifacts)" ]; then
            tar -czf zed-linux-aarch64.tar.gz -C release-artifacts .
            
            # Create remote server archive
            if [ -f release-artifacts/zed-remote-server ]; then
              gzip -c release-artifacts/zed-remote-server > zed-remote-server-linux-aarch64.gz
            fi
          else
            echo "⚠️ No binaries found to package"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-aarch64
          path: |
            zed-linux-aarch64.tar.gz
            zed-remote-server-linux-aarch64.gz
    timeout-minutes: 60

  bundle_mac_x86_64:
    needs: [create_draft_release]
    if: |
      contains(github.event.inputs.build_platforms || 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64', 'mac-x86_64')
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Build release
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package release
        run: |
          mkdir -p release-artifacts
          
          if [ -f "target/x86_64-apple-darwin/release/zed-remote-server" ]; then
            cp target/x86_64-apple-darwin/release/zed-remote-server release-artifacts/
            gzip -c release-artifacts/zed-remote-server > zed-remote-server-macos-x86_64.gz
          else
            echo "⚠️ Remote server binary not found"
            exit 1
          fi

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-macos-x86_64
          path: zed-remote-server-macos-x86_64.gz
    timeout-minutes: 60

  bundle_mac_aarch64:
    needs: [create_draft_release]
    if: |
      contains(github.event.inputs.build_platforms || 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64', 'mac-aarch64')
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package release
        run: |
          mkdir -p release-artifacts
          
          if [ -f "target/aarch64-apple-darwin/release/zed-remote-server" ]; then
            cp target/aarch64-apple-darwin/release/zed-remote-server release-artifacts/
            gzip -c release-artifacts/zed-remote-server > zed-remote-server-macos-aarch64.gz
          else
            echo "⚠️ Remote server binary not found"
            exit 1
          fi

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-macos-aarch64
          path: zed-remote-server-macos-aarch64.gz
    timeout-minutes: 60

  bundle_windows_x86_64:
    needs: [create_draft_release]
    if: |
      contains(github.event.inputs.build_platforms || 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64', 'windows-x86_64')
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Build release
        shell: pwsh
        run: cargo build --release

      - name: Package release
        shell: pwsh
        run: |
          if (Test-Path "target/release/zed-remote-server.exe") {
            Compress-Archive -Path target/release/zed-remote-server.exe -DestinationPath zed-remote-server-windows-x86_64.zip
          } else {
            Write-Error "Remote server binary not found"
            exit 1
          }

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-windows-x86_64
          path: zed-remote-server-windows-x86_64.zip
    timeout-minutes: 60

  bundle_windows_aarch64:
    needs: [create_draft_release]
    if: |
      contains(github.event.inputs.build_platforms || 'linux-x86_64,linux-aarch64,mac-aarch64,mac-x86_64,windows-x86_64,windows-aarch64', 'windows-aarch64')
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Build release
        shell: pwsh
        run: |
          rustup target add aarch64-pc-windows-msvc
          cargo build --release --target aarch64-pc-windows-msvc

      - name: Package release
        shell: pwsh
        run: |
          if (Test-Path "target/aarch64-pc-windows-msvc/release/zed-remote-server.exe") {
            Compress-Archive -Path target/aarch64-pc-windows-msvc/release/zed-remote-server.exe -DestinationPath zed-remote-server-windows-aarch64.zip
          } else {
            Write-Error "Remote server binary not found"
            exit 1
          }

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-windows-aarch64
          path: zed-remote-server-windows-aarch64.zip
    timeout-minutes: 60

  upload_release_assets:
    needs:
      - create_draft_release
      - bundle_linux_aarch64
      - bundle_linux_x86_64
      - bundle_mac_aarch64
      - bundle_mac_x86_64
      - bundle_windows_aarch64
      - bundle_windows_x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/
          merge-multiple: true

      - name: Display structure of artifacts
        run: |
          echo "📁 Downloaded artifacts:"
          find ./artifacts -type f -exec ls -lh {} \;

      - name: Determine release tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          echo "🚀 Uploading assets to release $RELEASE_TAG..."
          
          find ./artifacts -type f \( -name "*.tar.gz" -o -name "*.gz" -o -name "*.zip" -o -name "*.dmg" \) | while read asset; do
            echo "  Uploading: $asset"
            gh release upload "$RELEASE_TAG" "$asset" --repo="$GITHUB_REPOSITORY" --clobber
          done
          
          echo "✅ All assets uploaded successfully"
    timeout-minutes: 30

  publish_release:
    needs: [upload_release_assets]
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.determine_tag.outputs.tag }}
        run: |
          echo "📢 Publishing release $RELEASE_TAG..."
          gh release edit "$RELEASE_TAG" --repo="$GITHUB_REPOSITORY" --draft=false
          echo "✅ Release $RELEASE_TAG is now public!"
    timeout-minutes: 30

  notify:
    needs: [publish_release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.determine_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ needs.publish_release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release URL:** ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.determine_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.event.inputs.release_tag }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
